<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat Exporter – Chrome Extension</title>
  <meta name="description" content="Export conversations from 8 AI chat services with one click. Supports Gemini, ChatGPT, Claude, Grok, Genspark, Microsoft Copilot, DeepSeek, and Perplexity." />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --bg2:      #16213e;
      --bg3:      #0f3460;
      --accent:   #50C878;
      --accent2:  #3aab60;
      --text:     #e0e0e0;
      --text-dim: #9ca3af;
      --border:   rgba(80,200,120,0.2);
      --radius:   12px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }
    nav {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav-logo span { font-size: 1.4rem; }
    .nav-links { display: flex; align-items: center; gap: 1.5rem; font-size: 0.9rem; }
    .nav-links a { color: var(--text-dim); }
    .nav-links a:hover { color: var(--accent); text-decoration: none; }

    /* ── Lang switcher ── */
    .lang-switcher {
      display: flex;
      gap: 0.35rem;
      margin-left: 0.5rem;
    }
    .lang-switcher button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.25rem 0.65rem;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .lang-switcher button.active,
    .lang-switcher button:hover {
      background: var(--accent);
      color: #0a0a14;
      font-weight: 700;
      border-color: var(--accent);
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(160deg, var(--bg2) 0%, var(--bg) 60%);
      text-align: center;
      padding: 5rem 1.5rem 4rem;
    }
    .hero-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }
    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .hero h1 .highlight { color: var(--accent); }
    .hero p {
      max-width: 600px;
      margin: 0 auto 2rem;
      color: var(--text-dim);
      font-size: 1.1rem;
    }
    .btn-primary {
      display: inline-block;
      background: var(--accent);
      color: #0a0a14;
      font-weight: 700;
      padding: 0.85rem 2rem;
      border-radius: 50px;
      font-size: 1rem;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--accent2); text-decoration: none; transform: translateY(-2px); }
    .hero-sub {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--text-dim);
    }

    /* ── Services ── */
    .services {
      padding: 4rem 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .section-label {
      text-align: center;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .section-title {
      text-align: center;
      font-size: clamp(1.4rem, 3vw, 1.9rem);
      font-weight: 700;
      margin-bottom: 2.5rem;
    }
    .service-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 1rem;
    }
    .service-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.2rem 1rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.95rem;
      transition: border-color 0.2s, transform 0.1s;
    }
    .service-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .service-card .icon { font-size: 1.8rem; display: block; margin-bottom: 0.4rem; }

    /* ── Features ── */
    .features {
      background: var(--bg2);
      padding: 4rem 1.5rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .features-inner { max-width: 900px; margin: 0 auto; }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 2.5rem;
    }
    .feature-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .feature-card .f-icon {
      font-size: 2rem;
      margin-bottom: 0.75rem;
      display: block;
    }
    .feature-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; }
    .feature-card p { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; }
    .badge-pro {
      display: inline-block;
      background: linear-gradient(90deg, #f59e0b, #ef4444);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 20px;
      vertical-align: middle;
      margin-left: 0.4rem;
      letter-spacing: 0.05em;
    }

    /* ── Highlights ── */
    .highlights {
      padding: 4rem 1.5rem;
      max-width: 900px;
      margin: 0 auto;
    }
    .highlight-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
      margin-top: 2.5rem;
    }
    .highlight-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
    }
    .highlight-item .h-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 0.1rem; }
    .highlight-item .h-text { font-size: 0.9rem; color: var(--text-dim); }
    .highlight-item .h-text strong { color: var(--text); display: block; margin-bottom: 0.2rem; }

    /* ── CTA ── */
    .cta {
      background: linear-gradient(135deg, var(--bg3) 0%, var(--bg2) 100%);
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 4rem 1.5rem;
    }
    .cta h2 { font-size: clamp(1.4rem, 3vw, 1.9rem); font-weight: 700; margin-bottom: 1rem; }
    .cta p { color: var(--text-dim); margin-bottom: 2rem; }

    /* ── Footer ── */
    footer {
      background: #0d0d1a;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-dim);
    }
    footer .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 1rem; flex-wrap: wrap; }

    @media (max-width: 600px) {
      .nav-links { display: none; }
      .lang-switcher { display: flex; }
    }
  </style>
</head>

      'hero.sub':          '8つのAIチャットサービスの会話をMarkdown形式で即座にエクスポートできるChrome拡張機能。',

      'footer.contact':    'お問い合わせ',
    }
  };

  function applyLang(lang) {
    const d = DICT[lang];
    // text nodes
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (d[key] !== undefined) el.textContent = d[key];
    });
    // html nodes
    document.querySelectorAll('[data-i18n-html]').forEach(el => {
      const key = el.getAttribute('data-i18n-html');
      if (d[key] !== undefined) el.innerHTML = d[key];
    });
    // active button
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ja').classList.toggle('active', lang === 'ja');
    // html lang attr
    document.documentElement.lang = lang;
  }

  function setLang(lang) {
    localStorage.setItem('ace-lang', lang);
    applyLang(lang);
  }

  // Init: localStorage → browser language → en
  (function () {
    const saved = localStorage.getItem('ace-lang');
    const auto  = navigator.language?.startsWith('ja') ? 'ja' : 'en';
    applyLang(saved || auto);
  })();
</script>
